# docker-compose.yml (The Final, Correct Volume Mapping)
version: '3.8'

services:
  web:
    build: .
    ports:
      - "5001:5000"
    volumes:
      # This maps your entire project, including app.py and templates
      - .:/app
      
      # THIS IS THE MISSING LINE THAT FIXES EVERYTHING.
      # It ensures that your static folder on your machine is the same
      # as the static folder in the container, so changes are reflected.
      - ./static:/app/static

      # The uploads folder also needs to be explicitly mapped
      - ./uploads:/app/uploads

    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/expensedb
    depends_on:
      db:
        condition: service_healthy
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--timeout", "120", "app:app"]

  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=expensedb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d expensedb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

