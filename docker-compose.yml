# docker-compose.yml (The Final, Correct Version with Timeout)
version: '3.8'

services:
  web:
    build: .
    ports:
      - "5001:5000"
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/expensedb
    depends_on:
      db:
        condition: service_healthy
    # This command increases the worker timeout to 120 seconds,
    # giving the app enough time to start on a low-resource machine.
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--timeout", "120", "app:app"]

  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=expensedb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d expensedb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

