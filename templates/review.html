<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Expense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <img src="{{ url_for('static', filename='logo.png') }}" alt="App Logo" class="logo-img">
            <nav style="margin-left: auto;">
                <a href="{{ url_for('index') }}">&larr; Back to Expenses</a>
            </nav>
        </header>

        <div class="card">
            <h2>Confirm Details</h2>
            <form method="POST">
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="expense_date" value="{{ expense_date }}" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" value="{{ description }}" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category">
                        {% for category in categories %}
                            <option value="{{ category }}" {% if category == 'Misc' %}selected{% endif %}>{{ category }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex-grow: 1;">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" name="amount" step="0.01" value="{{ amount }}" required>
                    </div>
                    <div>
                        <label for="currency">Currency</label>
                        <select id="currency" name="currency" style="padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border-color); height: 50px;">
                            {% for currency in currencies %}
                                <option value="{{ currency }}" {% if currency == 'MXN' %}selected{% elif currency == 'USD' and not 'MXN' in currencies %}selected{% endif %}>{{ currency }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Save Expense</button>
            </form>
        </div>

        <div class="card">
            <h2>Raw Scanned Text</h2>
            <div class="raw-text">{{ raw_text }}</div>
        </div>
    </div>
</body>
</html>
